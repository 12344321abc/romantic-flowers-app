<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8B2F5E">
    <title>Личный кабинет - Romantic Flower Farm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="/static/img/favicon.png" type="image/png">
</head>
<body>
    <div id="toast-container"></div>
    <div id="shop-view">
        <header>
            <h1><a href="/" class="site-title">🌸 Romantic Flower Farm</a></h1>
            <nav id="main-nav">
                <!-- Nav links will be updated by JS -->
            </nav>
        </header>

        <main>
            <h2>Личный кабинет</h2>
            <div id="account-info">
                <h3>Ваши данные</h3>
                <div class="account-details">
                    <div class="account-detail-item">
                        <span class="detail-label">Контакт</span>
                        <span class="detail-value" id="user-contact-name"></span>
                    </div>
                    <div class="account-detail-item">
                        <span class="detail-label">Логин</span>
                        <span class="detail-value" id="user-username"></span>
                    </div>
                    <div class="account-detail-item">
                        <span class="detail-label">Адрес доставки</span>
                        <span class="detail-value" id="user-address"></span>
                    </div>
                </div>
            </div>
            
            <div id="order-history">
                <h3>История заказов</h3>
                <div id="order-history-container">
                    <!-- Order history will be rendered here by JavaScript -->
                </div>
                <div id="no-orders-message" class="hidden empty-state">
                    <span class="empty-state-icon">📦</span>
                    <p>Заказов пока нет</p>
                    <p class="empty-state-hint">Здесь появятся все ваши оформленные заказы</p>
                    <a href="/" class="button">Перейти к каталогу</a>
                </div>
            </div>
        </main>

        <footer>
            <p><a href="https://t.me/romantic_shopping_bot" target="_blank" rel="noopener noreferrer">🔔 Оповещения о новых поставках в Telegram</a></p>
            <p>&copy; 2025 Romantic Flower Farm. Все права защищены.</p>
        </footer>
    </div>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
