<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8B2F5E">
    <title>Корзина - Romantic Flower Farm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="/static/img/favicon.png" type="image/png">
</head>
<body>
    <div id="toast-container"></div>
    <div id="cart-view">
        <header>
            <h1><a href="/" class="site-title">🌸 Romantic Flower Farm</a></h1>
            <nav id="main-nav">
                <!-- Nav links will be updated by JS -->
            </nav>
        </header>

        <main>
            <h2>Ваша корзина</h2>
            <div id="cart-items-container">
                <!-- Cart items will be rendered here by JavaScript -->
            </div>
            <div id="cart-summary">
                <div class="cart-total-row">
                    <span class="cart-total-label">Сумма заказа:</span>
                    <span class="cart-total-value"><span id="cart-total-price">0</span> ₽</span>
                </div>
                <hr>
                <h3>Оформить заказ</h3>
                <form id="order-form">
                    <div class="form-group">
                        <label for="customer-comment">Комментарий (необязательно)</label>
                        <textarea id="customer-comment" name="customer-comment" rows="3" placeholder="Особые пожелания, время доставки, контактный телефон..."></textarea>
                    </div>
                    <p id="cart-minimum-error" class="info-message cart-notice"></p>
                    <button type="submit" id="place-order-btn">Подтвердить заказ</button>
                </form>
            </div>
            <div id="cart-empty-message" class="hidden">
                <div class="empty-state">
                    <span class="empty-state-icon">🛒</span>
                    <p>В корзине пока ничего нет</p>
                    <p class="empty-state-hint">Добавьте цветы из каталога, чтобы оформить заказ</p>
                    <a href="/" class="button">Перейти к каталогу</a>
                </div>
            </div>
        </main>

        <footer>
            <p><a href="https://t.me/romantic_shopping_bot" target="_blank" rel="noopener noreferrer">🔔 Оповещения о новых поставках в Telegram</a></p>
            <p>&copy; 2025 Romantic Flower Farm. Все права защищены.</p>
        </footer>
    </div>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
